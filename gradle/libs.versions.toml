[versions]
#android-gradle-plugin = "9.0.1"
android-gradle-plugin = "8.13.2"
ksp = "2.3.4"
kotlin = "2.3.20"
appcompat = "1.7.1"
core-ktx = "1.18.0"
constraintlayout = "2.2.1"
legacy-support-v4 = "1.0.0"
junit = "4.13.1"
androidx-junit = "1.1.2"
espresso = "3.3.0"
multidex = "2.0.1"
cardview = "1.0.0"
recyclerview = "1.4.0"
material = "1.13.0"
